<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=wireframe/index.html">
  <title>Redirecting to PLPI BAR Automation Wireframe</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f4f8;
      color: #1a1f2c;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
      max-width: 450px;
    }
    h2 {
      margin-top: 0;
      color: #0b73b7;
      font-size: 22px;
    }
    p {
      color: #4a5568;
      font-size: 14px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background-color: #0b73b7;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      margin-top: 20px;
      transition: background-color 0.2s, transform 0.1s;
    }
    .btn:hover {
      background-color: #07598d;
    }
    .btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>PLPI BAR Automation Wireframe</h2>
    <p>Redirecting you to the wireframe module...</p>
